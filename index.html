<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  input, button {
    margin: 5px;
    padding: 5px;
  }
  #qr-code {
    margin-top: 20px;
  }
  label {
    margin-right: 5px;
  }
</style>
</head>
<body>

<h1>QR Code Generator</h1>

<input type="text" id="text" placeholder="Enter URL or text" style="width:300px;"><br>

<label for="dotColor">Dot Color:</label>
<input type="color" id="dotColor" value="#000000">

<label for="bgColor">Background Color:</label>
<input type="color" id="bgColor" value="#ffffff"><br>

<label for="logoInput">Logo (optional):</label>
<input type="file" id="logoInput" accept="image/*"><br>

<button id="generate">Generate QR</button>
<button id="download">Download QR</button>

<div id="qr-code"></div>

<!-- QR Code Styling Library -->
<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  // Create QR code instance
  const qrCode = new QRCodeStyling({
    width: 300,
    height: 300,
    data: "https://example.com",
    dotsOptions: { color: "#000000", type: "rounded" },
    backgroundOptions: { color: "#ffffff" },
    imageOptions: { crossOrigin: "anonymous", margin: 5 }
  });

  // Attach QR to the page
  const qrDiv = document.getElementById("qr-code");
  qrDiv.innerHTML = "";
  qrCode.append(qrDiv);

  // Generate QR code
  document.getElementById("generate").addEventListener("click", () => {
    const text = document.getElementById("text").value.trim();
    const dotColor = document.getElementById("dotColor").value;
    const bgColor = document.getElementById("bgColor").value;
    const logoFile = document.getElementById("logoInput").files[0];

    if (!text) {
      alert("Please enter URL or text!");
      return;
    }

    if (logoFile) {
      const reader = new FileReader();
      reader.onload = function(e) {
        qrCode.update({
          data: text,
          dotsOptions: { color: dotColor },
          backgroundOptions: { color: bgColor },
          image: e.target.result
        });
      };
      reader.readAsDataURL(logoFile);
    } else {
      qrCode.update({
        data: text,
        dotsOptions: { color: dotColor },
        backgroundOptions: { color: bgColor },
        image: ""
      });
    }
  });

  // Download QR code
  document.getElementById("download").addEventListener("click", () => {
    qrCode.download({ name: "qr-code", extension: "png" });
  });
});
</script>

</body>
</html>
